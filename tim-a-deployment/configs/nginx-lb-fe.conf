# nginx-lb-fe.conf → /etc/nginx/sites-available/orderapp di vm-lb (10.0.0.10)
# Opsi A: vm-lb dan vm-fe digabung — 1 VM melayani LB + static frontend.
# FP TKA 2026 — Tim A.

upstream backend_pool {
    server 10.0.0.11:5000 max_fails=3 fail_timeout=10s;   # vm-app (single, 3-VM scheme)
    # server 10.0.0.12:5000 max_fails=3 fail_timeout=10s; # vm-app2 — aktifkan jika quota 8 vCPU
    keepalive 64;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Static frontend ──────────────────────────────────
    root  /var/www/orderfe;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # ── API proxy → backend pool (menggantikan peran vm-fe → vm-lb) ──
    # Frontend pakai API_BASE="/api" → same-origin, no CORS.
    # Trailing slash di proxy_pass membuang prefix /api/: /api/orders → /orders
    location /api/ {
        proxy_pass http://backend_pool/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        client_max_body_size 2m;

        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # ── Health check langsung ke backend ─────────────────
    location = /health {
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }
}
