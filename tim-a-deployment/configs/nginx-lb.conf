# nginx-lb.conf → /etc/nginx/sites-available/orderapp di vm-lb (10.0.0.10)
# FP TKA 2026 — Tim A (Phase 3). Reverse proxy + load balancing ke app servers.

upstream backend_pool {
    # Strategy: round-robin (default). Untuk eksplorasi (Tips soal #3), ganti baris
    # pertama jadi `least_conn;` atau pakai weight=N pada server (weighted).
    # least_conn;

    server 10.0.0.11:5000 max_fails=3 fail_timeout=10s;   # vm-app1
    server 10.0.0.12:5000 max_fails=3 fail_timeout=10s;   # vm-app2

    # Pool koneksi persisten ke app → hindari TCP handshake tiap request (naikkan RPS).
    keepalive 64;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Body besar (mis. order banyak item) — beri ruang.
    client_max_body_size 2m;

    location / {
        proxy_pass http://backend_pool;

        # Wajib utk keepalive ke upstream:
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Failover: kalau 1 app error/timeout, coba app lain (verifikasi HA di DoD).
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # Health check ringan (tanpa log).
    location = /health {
        proxy_pass http://backend_pool;
        access_log off;
    }
}
