# nginx-fe.conf → /etc/nginx/sites-available/orderfe di vm-fe (10.0.0.14)
# FP TKA 2026 — Tim A (Phase 4). Serve static + reverse proxy /api ke LB (anti-CORS).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root  /var/www/orderfe;
    index index.html;

    # Static frontend
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy API → vm-lb (port 80). FE pakai API_BASE="/api" → same-origin, no CORS.
    # Trailing slash di proxy_pass membuang prefix /api/:  /api/orders → /orders
    location /api/ {
        proxy_pass http://10.0.0.10/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
