# nginx-lb-main.conf → /etc/nginx/nginx.conf di vm-lb (10.0.0.10)
# FP TKA 2026 — Tim A (Phase 3). Tuning untuk high-concurrency / max RPS.
user www-data;

# 1 worker per core. vm-lb 1 vCPU → 1 worker proc, tapi tiap worker handle ribuan koneksi.
worker_processes auto;

# Anti "too many open files" — cocokkan dgn LimitNOFILE service & ulimit sistem.
worker_rlimit_nofile 65535;

pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 8192;   # max koneksi simultan per worker (kritis utk concurrency)
    use epoll;                 # event model efisien di Linux
    multi_accept on;           # terima banyak koneksi sekaligus per event
}

http {
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    server_tokens off;

    # Keepalive ke client → kurangi overhead handshake saat Locust spam request.
    keepalive_timeout  65;
    keepalive_requests 10000;

    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Saat load test, matikan access log (I/O per-request bisa jadi bottleneck).
    access_log off;
    error_log  /var/log/nginx/error.log warn;

    gzip on;

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
