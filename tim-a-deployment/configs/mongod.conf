# mongod.conf — vm-db (10.0.0.13), MongoDB 7.0, Ubuntu 22.04, 2vCPU/4GB
# Order Processing Service — FP TKA 2026 (Tim A)
#
# Strategi keamanan: TIDAK pakai auth, tapi DIKUNCI di level network.
#   - bindIp hanya loopback + internal IP (bukan 0.0.0.0)
#   - port 27017 hanya dibuka untuk subnet 10.0.0.0/24 via GCP firewall + ufw
#   - app.py default MONGO_URI tanpa kredensial → cocok tanpa auth
# Kalau dosen minta auth, aktifkan blok `security.authorization` di bawah.

# Tempat penyimpanan data & engine
storage:
  dbPath: /var/lib/mongodb
  wiredTiger:
    engineConfig:
      # vm-db 4GB RAM. Default MongoDB = (RAM-1)*0.5 = ~1.5GB.
      # MongoDB satu-satunya service di VM ini → naikkan ke 2.0GB
      # agar working set (10k orders + index) muat di cache. Sisakan
      # ~2GB untuk OS + page cache + koneksi.
      cacheSizeGB: 2.0

# Logging
systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log

# Network — KRITIS: bind ke internal IP supaya vm-app bisa connect,
# tapi JANGAN 0.0.0.0 (itu expose ke publik kalau firewall bocor).
net:
  port: 27017
  bindIp: 127.0.0.1,10.0.0.13
  maxIncomingConnections: 20000   # default 65536; cukup besar utk 2 app VM x worker

# Proses
processManagement:
  timeZoneInfo: /usr/share/zoneinfo

# --- Optional: aktifkan kalau butuh auth ---
# security:
#   authorization: enabled
# (Lalu buat user admin via mongosh sebelum mengunci.)
